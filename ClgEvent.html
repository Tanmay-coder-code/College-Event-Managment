<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

       <style>
        body{
            background: linear-gradient(to right,#17354f,#00f1fe24);
        }

        .form-container{
            max-width:700px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
            font-weight:bold;
        }

        .btn{
            width:100%;
        }
    </style>
    
</head>
<body>

<div class="container">

    <div class="form-container">

        <h2>College Event Registration Form</h2>

        <form>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter Full Name" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">PRN Number</label>
                    <input type="text" class="form-control" placeholder="Enter Roll Number" required>
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Email I'D</label>
                    <input type="email" class="form-control" placeholder="Enter Email">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="tel" class="form-control" placeholder="Enter Mobile Number">
                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Department</label>
                    <select class="form-select">
                        <option selected>Select Department</option>
                        <option>Information Technology</option>
                        <option>Computer Engineering</option>
                        <option>Mechanical Engineering</option>
                        <option>Civil Engineering</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Year</label>
                    <select class="form-select">
                        <option>First Year</option>
                        <option>Second Year</option>
                        <option selected>Third Year</option>
                        <option>Final Year</option>
                    </select>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">Select Event</label>

                <select class="form-select">
                    <option>Technical Quiz</option>
                    <option>Hackathon</option>
                    <option>Project Exhibition</option>
                    <option>Vibe Coding Competition</option>
                    <option>Poster Presentation (CEPF)</option>
                </select>

            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label><br>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Male</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Female</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Other</label>
                </div>

            </div>

            <div class="mb-3">
                <label class="form-label">Skills</label><br>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Programming</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Front-end</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">Back-end</label>
                </div>

            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input">
                <label class="form-check-label">
                    I agree to the Terms & Conditions
                </label>
            </div>

            <div class="row">

                <div class="col-md-6 mb-2">
                    <button type="submit" class="btn btn-success">
                        Register
                    </button>
                </div>

                <div class="col-md-6 mb-2">
                    <button type="reset" class="btn btn-danger">
                        Reset
                    </button>
                </div>

            </div>

        </form>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
